<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Aventura Infinita</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Oswald:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="background-overlay"></div>

    <section class="hero-section">
        <div class="central-tulip-container"></div>
        <div class="hero-text">
            <h1 class="romantic-title">Cada final feliz...</h1>
            <p class="marvel-title">COMIENZA AQUÍ</p>
            <div class="scroll-down"><span>↓</span></div>
        </div>
    </section>

    <section class="gallery-flow">
        <div class="flow-item"><img src="https://i.postimg.cc/ZR7k9TN0/dan1.jpg" alt="1"></div>
        <div class="flow-item"><img src="https://i.postimg.cc/C1PyZF8B/dan2.jpg" alt="2"></div>
        <div class="flow-item"><img src="https://i.postimg.cc/TYxSRLFq/dan3.jpg" alt="3"></div>
        <div class="flow-item"><img src="https://i.postimg.cc/CL0tFBXC/dan4.jpg" alt="4"></div>
    </section>

    <section class="proposal-final">
        <div class="proposal-content">
            <h1 class="romantic-title">Y mi final feliz...</h1>
            <p class="final-question">¿ERES TÚ?</p>
            <div class="buttons-container">
                <button class="btn btn-yes" onclick="celebrate()">¡SÍ!</button>
                <button class="btn btn-no" id="btnNo">No</button>
            </div>
        </div>
    </section>

    <div id="successOverlay" class="success-overlay">
        <div class="success-card">
            <h1>¡Misión Cumplida!</h1>
            <p>Te amo 3 millones... ❤️</p>
            <p style="font-size: 1.1rem; margin-top: 20px; font-family: 'Poppins'; color: #fff; line-height: 1.6;">
                Quiero estar contigo hasta que el tiempo diga lo contrario.
            </p>
        </div>
    </div>

    <script>
        // Función de Celebración
        function celebrate() {
            const success = document.getElementById('successOverlay');
            success.style.display = 'flex';
            setTimeout(() => { success.style.opacity = '1'; }, 10);
            createSparkles(success);
        }

        function createSparkles(container) {
            for (let i = 0; i < 50; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                s.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(s);
            }
        }

        // Botón que escapa
        const btnNo = document.getElementById('btnNo');
        btnNo.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight);
            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        });

        const observerOptions = { threshold: 0.25 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.flow-item').forEach(item => {
            observer.observe(item);
        });
    </script>
</body>
</html>
